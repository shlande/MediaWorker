apiVersion: v1
kind: ConfigMap
metadata:
  name: janitor-config
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: janitor
    app.kubernetes.io/part-of: mediaworker
data:
  janitor.yaml: |
    # pg_dsn password MUST be injected cluster-locally before apply (real value lives in CNPG secret pg-mediaworker-app, namespace mediaworker-test). Never commit real credentials.
    # 密码必须在 apply 前通过集群本地方式注入 (真实值存于 CNPG secret pg-mediaworker-app). 绝不提交真实凭据.
    metadata:
      pg_dsn: "postgres://mediaworker:REPLACE_VIA_CLUSTER_LOCAL_SECRET@pg-mediaworker-rw.mediaworker-test.svc.cluster.local:5432/mediaworker?sslmode=disable"

    storage:
      # Same cloud_accounts/vendor_profiles/rate_limits shape as ingest-worker.
      # The janitor needs the account pool to call Driver.Remove on orphaned
      # blobs (accountpool.BuildFromConfig is reused).
      cloud_accounts:
        - vendor: baidu
          account_id: "baidu_acct_01"
          client_id: "baidu_client_id_sample"
          client_secret: "baidu_client_secret_sample"
          refresh_token: "baidu_refresh_token_sample"
          redirect_uri: "http://localhost:8080/auth/callback/baidu"
          region: "cn"
          enabled: true
        - vendor: onedrive
          account_id: "onedrive_acct_01"
          client_id: "onedrive_client_id_sample"
          client_secret: "onedrive_client_secret_sample"
          refresh_token: "onedrive_refresh_token_sample"
          redirect_uri: "http://localhost:8080/auth/callback/onedrive"
          region: "global"
          enabled: true
      vendor_profiles:
        baidu:
          weight: 2.0
          base_latency_ms: 200
          bandwidth_mbps: 80
        onedrive:
          weight: 2.0
          base_latency_ms: 80
          bandwidth_mbps: 40
      rate_limits:
        baidu:
          qps: 2.0
          burst: 4
          concurrent: 8
        onedrive:
          qps: 10.0
          burst: 20
          concurrent: 16

    gc:
      interval: "1h"
      min_age: "24h"
      grace: "24h"
      batch_limit: 500
      dry_run: true
      once: false
---
# dry_run defaults to true. To enable real deletion, set gc.dry_run: false in
# the ConfigMap AND pass -dry-run=false flag. Plan line 221:
# "DryRun 语义不得被任何代码路径绕过".
#
# The janitor has NO HTTP server — it is a CLI GC loop (MarkOrphans + Sweep
# on a 1h ticker). No liveness/readiness probes: a liveness probe would
# restart the pod mid-GC-cycle. The pod restarts on crash via the default
# restartPolicy: Always. replicas=1 only — concurrent janitors would race
# on the same orphaned blobs (no distributed locking is implemented).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: janitor
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: janitor
    app.kubernetes.io/part-of: mediaworker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: janitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: janitor
        app.kubernetes.io/part-of: mediaworker
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: janitor
          image: ghcr.io/shlande/janitor:latest
          imagePullPolicy: Always
          args:
            - "-config"
            - "/etc/mediaworker/janitor.yaml"
          env:
            - name: GOMAXPROCS
              value: "1"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /etc/mediaworker
              name: config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: janitor-config
