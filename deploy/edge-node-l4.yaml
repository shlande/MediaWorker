# edge-node-l4.yaml -- MediaWorker L4 edge node (test env, namespace: mediaworker-test)
# 1-replica StatefulSet with L4 backhaul + data plane enabled.
# Identity is pre-generated and stored in secret edge-l4-identity — mounted at /data/identity
# to avoid peer ID drift on pod recreation (which would break the L4 whitelist).
# Do NOT commit the identity key or the admin token.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-node-l4-config
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: edge-node-l4
    app.kubernetes.io/part-of: mediaworker
data:
  node.yaml: |
    node:
      identity:
        priv_key_path: "/data/identity/ed25519.key"

      declared_capabilities:
        edge: true
        l4_backhaul: true
        relay_provider: false
        peer_icp: true

      libp2p:
        listen:
          - "/ip4/0.0.0.0/tcp/9001"
          - "/ip4/0.0.0.0/udp/9001/quic"
        private_network:
          enabled: false
          force_pnet_env: false
        dht:
          mode: server
          namespace: "edge"
          advertise_ttl: "2m"
          advertise_interval: "30s"
          bootstrap_peers:
            - "/dns4/control-plane.mediaworker-test.svc.cluster.local/tcp/9001/p2p/12D3KooWSjSukohQ1Wkohcq21z3FoQ6iikANHRvs1i11yWfUBTLQ"
        nat_traversal:
          autonat: false
          auto_relay: false
          dcutr: false
        peer_store:
          path: "/data/peerstore.db"
          gc_interval: "1h"
        conn_gater:
          ip_rate_limit: 50

      jwt_service:
        endpoint: "http://control-plane.mediaworker-test.svc.cluster.local:8443/v1/node/jwt"
        refresh_interval: "5m"
        refresh_before_expiry: "5m"

    edge:
      prefix_cache: { enabled: true, path: "/data/prefix", size_gb: 1 }
      warm_cache:   { enabled: true, path: "/data/warm",   size_gb: 1 }

    access_layer:
      data_plane:
        enabled: true
        location_endpoint: "http://control-plane.mediaworker-test.svc.cluster.local:8443"
        link_pool: { max_entries: 10000 }

    hash_ring:
      replicas: 150

    # admin_api disabled — no local admin HTTP server for the L4 node.
    # (uncomment below if needed; token must be set cluster-locally)
    # admin_api:
    #   listen: "127.0.0.1:8081"
    #   token: ""
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: edge-node-l4
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: edge-node-l4
    app.kubernetes.io/part-of: mediaworker
spec:
  replicas: 1
  serviceName: edge-node-l4
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-node-l4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-node-l4
        app.kubernetes.io/part-of: mediaworker
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - oci-sg
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        fsGroup: 100
      initContainers:
        - name: ensure-data-dirs
          image: ghcr.io/shlande/edge-node:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - mkdir -p /data/prefix /data/warm
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
          volumeMounts:
            - name: data
              mountPath: /data
            - name: identity
              mountPath: /data/identity
      containers:
        - name: edge-node-l4
          image: ghcr.io/shlande/edge-node:latest
          imagePullPolicy: Always
          args:
            - -config
            - /etc/mediaworker/node.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: dht
              containerPort: 9001
              protocol: TCP
            - name: dht-quic
              containerPort: 9001
              protocol: UDP
          env:
            - name: CONTROL_PLANE_PUBKEY
              value: 2457cb230c29f9cbec3dd0a2a3770580785a994d5d967b1ef7155e5a8ee9dcb6
            - name: GOMAXPROCS
              value: "2"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/mediaworker
              readOnly: true
            - name: data
              mountPath: /data
            - name: identity
              mountPath: /data/identity
      volumes:
        - name: config
          configMap:
            name: edge-node-l4-config
        - name: data
          emptyDir: {}
        - name: identity
          secret:
            secretName: edge-l4-identity
            defaultMode: 0600
