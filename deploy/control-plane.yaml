# control-plane.yaml -- MediaWorker control-plane (test env, namespace: mediaworker-test)
# Extracted from live cluster with T17-deprecated `metadata.popularity_query_interval` removed.
# Do not edit by hand without consulting the live cluster state.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: mediaworker
data:
  control-plane.yaml: |
    # control-plane.yaml -- 测试环境配置 (k8s namespace: mediaworker-test)
    jwt_http:
      listen: ":8443"
      read_timeout: "10s"
      write_timeout: "10s"

    l4_whitelist:
      db_path: "/data/controlplane/l4-whitelist.db"

    pin_orchestrator:
      rebalance_interval: "10m"
      top_contents_limit: 5000

    dht_bootstrap:
      listen_addrs:
        - "/ip4/0.0.0.0/tcp/9001"
        - "/ip4/0.0.0.0/udp/9001/quic"
      namespace: "edge"
      advertise_ttl: "2m"
      advertise_interval: "30s"
      bootstrap_peers: []

    sync_broadcaster:
      protocol_id: "/edge/control/1.0.0"
      send_timeout: "30s"

    # DSN 指向同 namespace 下的 CNPG Cluster (deploy/postgres.yaml)
    # pg_dsn password MUST be injected cluster-locally before apply (real value lives in CNPG secret pg-mediaworker-app, namespace mediaworker-test). Never commit real credentials.
    # 密码必须在 apply 前通过集群本地方式注入 (真实值存于 CNPG secret pg-mediaworker-app). 绝不提交真实凭据.
    metadata:
      pg_dsn: "postgres://mediaworker:REPLACE_VIA_CLUSTER_LOCAL_SECRET@pg-mediaworker-rw.mediaworker-test.svc.cluster.local:5432/mediaworker?sslmode=disable"

    identity:
      priv_key_path: "/data/controlplane/ed25519-jwt.key"
      libp2p_priv_key_path: "/data/controlplane/ed25519-libp2p.key"

    admin_api:
      listen: ":8082"
      # REQUIRED at deploy time via cluster-local injection (kubectl patch / sealed-secret). Never commit real values. CP fails startup if left empty by design.
      # 部署时通过集群本地注入 (kubectl patch / sealed-secret). 绝不提交真实值. 留空则 CP 按设计拒绝启动.
      token_secret: ""
      prometheus_url: ""
      # REQUIRED at deploy time via cluster-local injection (kubectl patch / sealed-secret). Never commit real values. Empty = webhook endpoint not mounted (per config semantics).
      # 同上: 集群本地注入. 留空 = webhook 端点不挂载 (符合配置语义).
      alert_webhook_token: ""
      quota_rebalance_interval: "60s"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-data
  namespace: mediaworker-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: mediaworker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/part-of: mediaworker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        fsGroup: 100
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - oci-sg
      initContainers:
        - name: ensure-data-dirs
          image: ghcr.io/shlande/control-plane:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - mkdir -p /data/controlplane
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: control-plane
          image: ghcr.io/shlande/control-plane:latest
          imagePullPolicy: Always
          args:
            - -config
            - /etc/mediaworker/control-plane.yaml
          ports:
            - name: jwt-http
              containerPort: 8443
              protocol: TCP
            - name: dht
              containerPort: 9001
              protocol: TCP
            - name: dht-quic
              containerPort: 9001
              protocol: UDP
          env:
            - name: GOMAXPROCS
              value: "2"
            # Admin seed: env unset → CP generates a one-time random bootstrap password and logs it at startup (cluster-local only). Set cluster-locally if a fixed QA password is needed — never commit.
            # Admin 种子: env 未设置 → CP 生成一次性随机 bootstrap 密码并仅在启动日志中输出 (仅集群本地可见). 如需固定 QA 密码请集群本地设置 — 绝不提交.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: jwt-http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: jwt-http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/mediaworker
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: control-plane-config
        - name: data
          persistentVolumeClaim:
            claimName: control-plane-data
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: mediaworker-test
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: mediaworker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - name: jwt-http
      port: 8443
      protocol: TCP
      targetPort: jwt-http
    - name: dht
      port: 9001
      protocol: TCP
      targetPort: dht
    - name: dht-quic
      port: 9001
      protocol: UDP
      targetPort: dht-quic
