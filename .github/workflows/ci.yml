name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1 -timeout 180s -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout 5m

  docker-amd64:
    name: Docker (amd64)
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge-node (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.edge-node
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/edge-node:latest-amd64
            ghcr.io/${{ github.repository_owner }}/edge-node:${{ github.sha }}-amd64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push control-plane (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.control-plane
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/control-plane:latest-amd64
            ghcr.io/${{ github.repository_owner }}/control-plane:${{ github.sha }}-amd64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ingest-worker (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ingest-worker
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ingest-worker:latest-amd64
            ghcr.io/${{ github.repository_owner }}/ingest-worker:${{ github.sha }}-amd64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push janitor (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.janitor
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/janitor:latest-amd64
            ghcr.io/${{ github.repository_owner }}/janitor:${{ github.sha }}-amd64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-arm64:
    name: Docker (arm64)
    runs-on: ubuntu-24.04-arm
    needs: [test, lint]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge-node (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.edge-node
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/edge-node:latest-arm64
            ghcr.io/${{ github.repository_owner }}/edge-node:${{ github.sha }}-arm64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push control-plane (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.control-plane
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/control-plane:latest-arm64
            ghcr.io/${{ github.repository_owner }}/control-plane:${{ github.sha }}-arm64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ingest-worker (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ingest-worker
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ingest-worker:latest-arm64
            ghcr.io/${{ github.repository_owner }}/ingest-worker:${{ github.sha }}-arm64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push janitor (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.janitor
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/janitor:latest-arm64
            ghcr.io/${{ github.repository_owner }}/janitor:${{ github.sha }}-arm64
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest-merge:
    name: Merge multi-arch manifests
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests for :latest
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        run: |
          for svc in edge-node control-plane ingest-worker janitor; do
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository_owner }}/${svc}:latest \
              ghcr.io/${{ github.repository_owner }}/${svc}:latest-amd64 \
              ghcr.io/${{ github.repository_owner }}/${svc}:latest-arm64
          done

      - name: Create multi-arch manifests for :${{ github.sha }}
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        run: |
          for svc in edge-node control-plane ingest-worker janitor; do
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository_owner }}/${svc}:${{ github.sha }} \
              ghcr.io/${{ github.repository_owner }}/${svc}:${{ github.sha }}-amd64 \
              ghcr.io/${{ github.repository_owner }}/${svc}:${{ github.sha }}-arm64
          done

  deploy:
    name: Deploy to k8s (mediaworker-test)
    runs-on: ubuntu-latest
    needs: [manifest-merge]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Pin images to commit SHA and apply
        run: |
          set -euo pipefail
          sed -i "s|:latest|:${{ github.sha }}|g" deploy/control-plane.yaml deploy/edge-node.yaml deploy/ingest-worker.yaml deploy/janitor.yaml
          kubectl apply -f deploy/control-plane.yaml -f deploy/edge-node.yaml -f deploy/ingest-worker.yaml -f deploy/janitor.yaml

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          kubectl -n mediaworker-test rollout status deployment/control-plane --timeout=300s
          kubectl -n mediaworker-test rollout status deployment/ingest-worker --timeout=300s
          kubectl -n mediaworker-test rollout status deployment/janitor --timeout=300s
          kubectl -n mediaworker-test rollout status statefulset/edge-node --timeout=300s
