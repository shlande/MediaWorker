          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 添加 L4 白名单
      tags:
      - admin-whitelist
  /v1/admin/whitelist/{peer_id}:
    delete:
      description: 从白名单移除节点，下一个 JWT 更新周期（≤1h）生效
      parameters:
      - description: libp2p PeerID
        in: path
        name: peer_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "404":
          description: 节点不在白名单中
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 移除 L4 白名单
      tags:
      - admin-whitelist
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: 用户名+密码登录，签发 8 小时有效期的 UserToken
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/adminapi.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminapi.loginResponse'
        "400":
          description: 无效请求体
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: 凭据无效
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: 账号已禁用
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      summary: 管理员登录
      tags:
      - admin-auth
  /v1/auth/logout:
    post:
      description: 审计记录登出事件，客户端负责丢弃令牌（无服务端撤销）
      responses:
        "204":
          description: 无内容
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 管理员登出
      tags:
      - admin-auth
  /v1/auth/me:
    get:
      description: 从 UserToken 上下文中返回当前认证用户的身份信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminapi.meResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 获取当前登录用户信息
      tags:
      - admin-auth
  /v1/blob-locations/{hash}:
    get:
      description: 认证调用者能力 JWT，返回 blob 在边缘节点的 K 副本存储位置列表
      parameters:
      - description: blob SHA-256 哈希（十六进制）
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/locationsvc.locationsResponse'
        "400":
          description: 缺少 hash 路径参数
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: 缺失/过期/签名无效的 JWT
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: JWT 不含 Edge 能力
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "404":
          description: 哈希合法但无已存储位置
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: 元数据查询异常
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "503":
          description: BlobStoreClient 未配置（mc==nil）
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - NodeBearer: []
      summary: 按哈希查询 blob 存储位置
      tags:
      - locations
  /v1/node/jwt:
    post:
      consumes:
      - application/json
      description: 验证节点提供的 Ed25519 签名请求并签发能力 JWT
      parameters:
      - description: JWT 签发请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.JWTRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.JWTResponse'
        "400":
          description: 无效 JSON 或非法 PeerID
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: 签名验证失败
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "405":
          description: 方法不允许
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "429":
          description: 速率限制
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      summary: 签发节点能力 JWT
      tags:
      - node-auth
securityDefinitions:
  AdminBearer:
    description: 管理后台 UserToken，由 POST /v1/auth/login 签发
    in: header
    name: Authorization
    type: apiKey
  AlertWebhookToken:
    description: Alertmanager webhook 令牌
    in: header
    name: X-Alert-Token
    type: apiKey
  NodeBearer:
    description: 节点能力 JWT，由 POST /v1/node/jwt 签发
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
