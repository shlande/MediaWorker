host: localhost:8443
info:
  contact: {}
  description: 控制面 HTTP API：节点能力 JWT 签发、blob 存储位置查询、管理后台 API 与 Prometheus 指标。
  title: MediaWorker Control-Plane API
  version: "1.0"
paths:
  /metrics:
    get:
      description: Prometheus 文本格式指标端点
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Prometheus 指标
      tags:
      - ops
  /v1/admin/accounts:
    get:
      description: 返回所有云盘账号及其健康状态、速率限制与供应商档案，支持按 vendor 和 state 过滤
      parameters:
      - description: 供应商过滤
        in: query
        name: vendor
        type: string
      - description: 状态过滤（healthy|degraded|banned）
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminapi.accountsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 查询云盘账号列表
      tags:
      - admin-accounts
    post:
      consumes:
      - application/json
      description: 新建云盘账号，auth 字段按供应商 schema 验证
      parameters:
      - description: 创建账号请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/adminapi.createAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/adminapi.createAccountResponse'
        "400":
          description: 无效请求体或字段验证失败
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "409":
          description: 账号已存在
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 创建云盘账号
      tags:
      - admin-accounts
  /v1/admin/accounts/{vendor}/{id}:
    delete:
      description: 硬删除账号（单事务），账号仍持有 blob 副本时默认拒绝，?force=true 级联清理
      parameters:
      - description: 供应商
        in: path
        name: vendor
        required: true
        type: string
      - description: 账号 ID
        in: path
        name: id
        required: true
        type: string
      - description: 级联删除 blob_location 引用
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "204":
          description: 删除成功，无响应体
        "400":
          description: 路径参数无效
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "404":
          description: 账号不存在
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "409":
          description: 账号仍被 blob_location 引用（响应体含 blob_count）
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 删除云盘账号
      tags:
      - admin-accounts
    put:
      consumes:
      - application/json
      description: 部分更新账号属性，所有 body 字段可选，auth 字段变更触发凭据轮换
      parameters:
      - description: 供应商
        in: path
        name: vendor
        required: true
        type: string
      - description: 账号 ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新账号请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/adminapi.updateAccountRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/adminapi.updateAccountResponse'
        "400":
          description: 无效请求体/路径参数/字段验证失败
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "404":
          description: 账号不存在
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - AdminBearer: []
      summary: 更新云盘账号
      tags:
      - admin-accounts
  /v1/admin/accounts/{vendor}/{id}/ban:
    post:
      consumes:
      - application/json
      description: 设置账号为 banned 状态，默认封禁 24 小时
      parameters:
      - description: 供应商
        in: path
        name: vendor
        required: true
        type: string
      - description: 账号 ID
        in: path
        name: id
        required: true
        type: string
      - description: 封禁请求
        in: body
        name: request
        schema:
          $ref: '#/definitions/adminapi.banAccountRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/adminapi.accountOpResponse'
        "400":
