basePath: /
definitions:
  ingest.IngestResponse:
    properties:
      content_id:
        type: string
    type: object
  types.ErrorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 入库 Worker HTTP API：multipart 内容上传入库、存活探针与 Prometheus 指标。
  title: MediaWorker Ingest-Worker API
  version: "1.0"
paths:
  /healthz:
    get:
      description: 返回 200 "ok"，供 Kubernetes liveness/readiness 探针使用。
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: 存活探针
      tags:
      - ops
  /ingest/{content_type}:
    post:
      consumes:
      - multipart/form-data
      description: 接收 multipart/form-data 文件上传，经 ingest pipeline 处理后入库到云盘并写入元数据。
      parameters:
      - description: 内容类型（dash_video|image）
        in: path
        name: content_type
        required: true
        type: string
      - description: 上传文件
        in: formData
        name: file
        required: true
        type: file
      - description: JSON 元数据（ingest.ProcessOptions.Metadata）
        in: formData
        name: metadata
        type: string
      - description: 指定内容 ID
        in: formData
        name: content_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ingest.IngestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      summary: multipart 上传内容并入库
      tags:
      - ingest
  /metrics:
    get:
      description: 返回 Prometheus 文本格式指标，抓取前刷新 ingest_publish_failures 计数。
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Prometheus 指标
      tags:
      - ops
swagger: "2.0"
tags:
- description: 内容上传入库
  name: ingest
- description: 运维与指标
  name: ops
