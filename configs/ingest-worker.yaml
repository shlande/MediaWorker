# ingest-worker.yaml — MediaWorker standalone ingest worker config.
# This service receives content uploads via HTTP, runs ContentIngester
# processing (DASH video / image thumbnails), uploads blobs to cloud
# drives with K-redundancy, writes metadata transactions to PG, and
# publishes ContentIngestedEvent.

http:
  listen: ":8080"

metadata:
  pg_dsn: "postgres://mediaworker:mediaworker@pg-mediaworker-rw.mediaworker-test.svc.cluster.local:5432/mediaworker?sslmode=disable"

storage:
  cloud_accounts:
    - vendor: baidu
      account_id: "baidu_acct_01"
      client_id: "baidu_client_id_sample"
      client_secret: "baidu_client_secret_sample"
      refresh_token: "baidu_refresh_token_sample"
      redirect_uri: "http://localhost:8080/auth/callback/baidu"
      region: "cn"
      enabled: true
    - vendor: onedrive
      account_id: "onedrive_acct_01"
      client_id: "onedrive_client_id_sample"
      client_secret: "onedrive_client_secret_sample"
      refresh_token: "onedrive_refresh_token_sample"
      redirect_uri: "http://localhost:8080/auth/callback/onedrive"
      region: "global"
      enabled: true
  vendor_profiles:
    baidu:
      weight: 2.0
      base_latency_ms: 200
      bandwidth_mbps: 80
    onedrive:
      weight: 2.0
      base_latency_ms: 80
      bandwidth_mbps: 40
  rate_limits:
    baidu:
      qps: 2.0
      burst: 4
      concurrent: 8
    onedrive:
      qps: 10.0
      burst: 20
      concurrent: 16

ingest:
  ffmpeg_path: "/usr/bin/ffmpeg"
  work_dir: "/data/ingest"
  redundancy: 2
