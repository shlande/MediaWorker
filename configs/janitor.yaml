# janitor.yaml — MediaWorker standalone janitor GC service config.
# The janitor runs the two-phase soft-delete garbage collector (T13's
# internal/storage/gc.Collector) periodically against the metadata DB.
#
# DryRun defaults to TRUE: a freshly-deployed janitor with an empty/missing
# gc stanza only LOGS what it would delete — never calls Driver.Remove and
# never DELETEs PG rows. An explicit `dry_run: false` here OR
# `-dry-run=false` on the CLI is required to actually delete. Plan line 221:
# "DryRun 语义不得被任何代码路径绕过".

metadata:
  pg_dsn: "postgres://mediaworker:mediaworker@pg-mediaworker-rw.mediaworker-test.svc.cluster.local:5432/mediaworker?sslmode=disable"

storage:
  cloud_accounts:
    - vendor: baidu
      account_id: "baidu_acct_01"
      client_id: "baidu_client_id_sample"
      client_secret: "baidu_client_secret_sample"
      refresh_token: "baidu_refresh_token_sample"
      redirect_uri: "http://localhost:8080/auth/callback/baidu"
      region: "cn"
      enabled: true
    - vendor: onedrive
      account_id: "onedrive_acct_01"
      client_id: "onedrive_client_id_sample"
      client_secret: "onedrive_client_secret_sample"
      refresh_token: "onedrive_refresh_token_sample"
      redirect_uri: "http://localhost:8080/auth/callback/onedrive"
      region: "global"
      enabled: true
  vendor_profiles:
    baidu:
      weight: 2.0
      base_latency_ms: 200
      bandwidth_mbps: 80
    onedrive:
      weight: 2.0
      base_latency_ms: 80
      bandwidth_mbps: 40
  rate_limits:
    baidu:
      qps: 2.0
      burst: 4
      concurrent: 8
    onedrive:
      qps: 10.0
      burst: 20
      concurrent: 16

gc:
  # Interval between GC cycles in interval (long-run) mode. Default "1h".
  interval: "1h"
  # MinAge: minimum age a blob must reach before MarkOrphans will consider it
  # (guards the in-flight ingest transaction window). Default "24h".
  min_age: "24h"
  # Grace: window between soft-mark and hard-delete. A blob rescued
  # (content_blob reference appeared) during this window has its deleted_at
  # reset to NULL and is not deleted. Default "24h".
  grace: "24h"
  # BatchLimit: max blob_hashes Sweep processes per cycle. Default 500.
  batch_limit: 500
  # DryRun: when true (default), Sweep only logs `would delete blob=... locations=N
  # backends=[...]` — Driver.Remove is never called, no PG DELETE issued.
  # Set to false to actually delete. Plan line 221.
  dry_run: true
  # Once: run one GC cycle (phase 1 + phase 2) then exit (exit 0 / 1).
  # Default false (interval mode). Also selectable via `-once` CLI flag.
  once: false
